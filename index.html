<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beautiful Weather App</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#1d2671,#c33764);
      transition:1s;
      overflow:hidden;
    }

    .card{
      width:370px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border-radius:25px;
      padding:30px;
      text-align:center;
      color:white;
      box-shadow:0 8px 32px rgba(0,0,0,0.3);
    }

    .title{
      font-size:32px;
      font-weight:bold;
      margin-bottom:20px;
    }

    .search{
      display:flex;
      gap:10px;
      margin-bottom:20px;
    }

    .search input{
      flex:1;
      border:none;
      outline:none;
      padding:14px;
      border-radius:15px;
      font-size:16px;
    }

    .search button{
      border:none;
      outline:none;
      padding:14px 18px;
      border-radius:15px;
      background:white;
      cursor:pointer;
      font-size:18px;
      transition:0.3s;
    }

    .search button:hover{
      transform:scale(1.08);
    }

    .weather{
      display:none;
    }

    .weather-icon{
      width:130px;
      margin-top:10px;
    }

    .temp{
      font-size:64px;
      font-weight:bold;
      margin-top:10px;
    }

    .city{
      font-size:38px;
      margin-top:5px;
    }

    .details{
      display:flex;
      justify-content:space-between;
      margin-top:35px;
    }

    .col{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .col img{
      width:40px;
    }

    .humidity,
    .wind{
      font-size:22px;
      font-weight:bold;
    }

    .error{
      color:#ffdede;
      font-size:14px;
      margin-top:10px;
      text-align:left;
      display:none;
    }

/* MOBILE RESPONSIVE DESIGN */

@media screen and (max-width: 480px){

  body{
    padding:20px;
    align-items:center;
  }

  .card{
    width:100%;
    max-width:350px;
    padding:22px;
    border-radius:20px;
  }

  .title{
    font-size:28px;
  }

  .search{
    gap:8px;
  }

  .search input{
    padding:12px;
    font-size:15px;
  }

  .search button{
    padding:12px 16px;
    font-size:16px;
  }

  .weather-icon{
    width:110px;
  }

  .temp{
    font-size:52px;
  }

  .city{
    font-size:30px;
  }

  .details{
    flex-direction:column;
    gap:20px;
    margin-top:25px;
  }

  .col{
    justify-content:center;
  }

  .humidity,
  .wind{
    font-size:20px;
  }

}
  </style>
</head>

<body>

  <div class="card">

    <div class="title">Know Your City Weather</div>

    <div class="search">

      <input
      type="text"
      placeholder="Enter city name"
      id="cityInput">

      <button
      type="button"
      onclick="getWeather()">

      🔍

      </button>

    </div>

    <div class="error" id="error">
      Invalid city name
    </div>

    <div class="weather" id="weatherBox">

      <img
      src="https://cdn-icons-png.flaticon.com/512/869/869869.png"
      class="weather-icon"
      id="weatherIcon">

      <div class="temp" id="temperature">
        22°C
      </div>

      <div class="city" id="city">
        Delhi
      </div>

      <div class="details">

        <div class="col">

          <img
          src="https://cdn-icons-png.flaticon.com/512/5664/5664995.png">

          <div>
            <div class="humidity" id="humidity">
              50%
            </div>

            <p>Humidity</p>
          </div>

        </div>

        <div class="col">

          <img
          src="https://cdn-icons-png.flaticon.com/512/5538/5538618.png">

          <div>
            <div class="wind" id="wind">
              15 km/h
            </div>

            <p>Wind Speed</p>
          </div>

        </div>

      </div>

    </div>

  </div>

 <script>

const apiKey = "16aed23c358cfe9ff106ee08a7badd98";

async function getWeather(){

  const city =
  document.getElementById("cityInput").value;

  if(city == ""){
    alert("Please enter city name");
    return;
  }

  const apiURL =
  `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

  try{

    const response = await fetch(apiURL);

    const data = await response.json();

    if(data.cod == "404"){

      document.getElementById("error").style.display =
      "block";

      document.getElementById("weatherBox").style.display =
      "none";

      return;
    }

    document.getElementById("error").style.display =
    "none";

    document.getElementById("city").innerHTML =
    data.name;

    const temp =
    Math.round(data.main.temp);

    document.getElementById("temperature").innerHTML =
    temp + "°C";

    document.getElementById("humidity").innerHTML =
    data.main.humidity + "%";

    document.getElementById("wind").innerHTML =
    data.wind.speed + " km/h";

    const weatherMain =
    data.weather[0].main;

    const icon =
    document.getElementById("weatherIcon");

    // Weather Icons

    if(weatherMain == "Clouds"){

      icon.src =
      "https://cdn-icons-png.flaticon.com/512/414/414825.png";

    }
    else if(weatherMain == "Clear"){

      icon.src =
      "https://cdn-icons-png.flaticon.com/512/869/869869.png";

    }
    else if(weatherMain == "Rain"){

      icon.src =
      "https://cdn-icons-png.flaticon.com/512/1163/1163624.png";

    }
    else if(weatherMain == "Snow"){

      icon.src =
      "https://cdn-icons-png.flaticon.com/512/642/642102.png";

    }
    else{

      icon.src =
      "https://cdn-icons-png.flaticon.com/512/1779/1779940.png";

    }

    // DAY / NIGHT DETECTION

    const currentTime = data.dt;
    const sunrise = data.sys.sunrise;
    const sunset = data.sys.sunset;

    const isNight =
    currentTime < sunrise || currentTime > sunset;

    // DYNAMIC BACKGROUND

    // NIGHT BACKGROUNDS

    if(isNight){

      if(weatherMain == "Clear"){

        document.body.style.background =
        "linear-gradient(135deg,#0f2027,#203a43,#2c5364)";

      }
      else if(weatherMain == "Clouds"){

        document.body.style.background =
        "linear-gradient(135deg,#232526,#414345)";

      }
      else if(weatherMain == "Rain"){

        document.body.style.background =
        "linear-gradient(135deg,#141e30,#243b55)";

      }
      else if(weatherMain == "Snow"){

        document.body.style.background =
        "linear-gradient(135deg,#757f9a,#d7dde8)";

      }
      else{

        document.body.style.background =
        "linear-gradient(135deg,#1c1c1c,#434343)";

      }

    }

    // DAY BACKGROUNDS

    else{

      if(weatherMain == "Clear"){

        if(temp >= 35){

          document.body.style.background =
          "linear-gradient(135deg,#ff512f,#f09819)";

        }
        else{

          document.body.style.background =
          "linear-gradient(135deg,#56ccf2,#2f80ed)";

        }

      }

      else if(weatherMain == "Clouds"){

        document.body.style.background =
        "linear-gradient(135deg,#bdc3c7,#2c3e50)";

      }

      else if(weatherMain == "Rain"){

        document.body.style.background =
        "linear-gradient(135deg,#4b79a1,#283e51)";

      }

      else if(weatherMain == "Snow"){

        document.body.style.background =
        "linear-gradient(135deg,#e6dada,#274046)";

      }

      else{

        document.body.style.background =
        "linear-gradient(135deg,#89f7fe,#66a6ff)";

      }

    }

    document.getElementById("weatherBox").style.display =
    "block";

  }

  catch(error){

    console.log(error);

    alert("Something went wrong");

  }

}

</script>

</body>
</html>
